<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EcoSmartGIS RTH – Bappeda Kabupaten Tangerang</title>
  <link rel="icon" type="image/png" href="./favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #07111f;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    /* ── iframe: full viewport ──────────────────────────── */
    #smartgis-frame {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      border: none;
      background: #07111f;
    }

    /* ── Loading overlay: hanya teks, tidak ada card ─────── */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #07111f;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #loading-text {
      color: rgba(255, 255, 255, 0.60);
      font-size: 14px;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <iframe
    id="smartgis-frame"
    title="EcoSmartGIS RTH – Bappeda Kabupaten Tangerang"
    referrerpolicy="strict-origin-when-cross-origin"
    src="about:blank"
  ></iframe>

  <div id="loading-overlay">
    <span id="loading-text">Validasi domain.. mohon tunggu...</span>
  </div>

  <script>
    /* ─────────────────────────────────────────────────────
       KONFIGURASI — ganti hanya baris ini jika URL GAS berubah
    ───────────────────────────────────────────────────── */
    var SMARTGIS_URL =
      'https://script.google.com/macros/s/' +
      'AKfycbzDMAArILeaMOlq-Y6f-pRbX-Qg4aMLikRlaPOa92TtObYqjiWFnHZmQPmEcCQDLq5aoQ' +
      '/exec';

    /* Teruskan query string & hash dari URL gateway ke GAS */
    var targetUrl = SMARTGIS_URL +
      (window.location.search || '') +
      (window.location.hash  || '');

    var frame   = document.getElementById('smartgis-frame');
    var overlay = document.getElementById('loading-overlay');

    function hideOverlay() {
      overlay.classList.add('hidden');
    }

    /* Sembunyikan overlay begitu iframe selesai load */
    frame.addEventListener('load', hideOverlay);

    /* Fallback: sembunyikan overlay setelah 15 detik
       walau load event tidak terpicu                  */
    var fallbackTimer = setTimeout(hideOverlay, 15000);

    frame.addEventListener('load', function() {
      clearTimeout(fallbackTimer);
    });

    /* Mulai muat iframe */
    frame.src = targetUrl;
  </script>

  <!-- Fallback tanpa JavaScript -->
  <noscript>
    <meta http-equiv="refresh"
      content="0;url=https://script.google.com/macros/s/AKfycbzDMAArILeaMOlq-Y6f-pRbX-Qg4aMLikRlaPOa92TtObYqjiWFnHZmQPmEcCQDLq5aoQ/exec">
  </noscript>

</body>
</html>
