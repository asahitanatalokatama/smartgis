<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>SmartGIS - Ekosistem RTH</title>
  <link rel="icon" type="image/png" href="./favicon.png" />

  <style>
    :root {
      --bg-1: #07111f;
      --bg-2: #0f2f25;
      --glass: rgba(255, 255, 255, 0.12);
      --glass-border: rgba(255, 255, 255, 0.22);
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.72);
      --green: #22c55e;
      --green-dark: #15803d;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(34, 197, 94, 0.22), transparent 32%),
        radial-gradient(circle at 80% 80%, rgba(14, 165, 233, 0.18), transparent 34%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      color: var(--text);
      overflow: hidden;
    }

    .page {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(520px, 100%);
      padding: 34px 30px;
      border-radius: 28px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      box-shadow:
        0 30px 90px rgba(0, 0, 0, 0.36),
        inset 0 1px 0 rgba(255, 255, 255, 0.24);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      text-align: center;
    }

    .logo {
      width: 74px;
      height: 74px;
      margin: 0 auto 18px;
      border-radius: 22px;
      display: grid;
      place-items: center;
      background: linear-gradient(145deg, rgba(34, 197, 94, 0.95), rgba(14, 165, 233, 0.82));
      box-shadow:
        0 18px 50px rgba(34, 197, 94, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.38);
      font-size: 32px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3vw, 30px);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    p {
      margin: 12px auto 0;
      max-width: 420px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 24px;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      padding: 0 20px;
      border-radius: 999px;
      text-decoration: none;
      font-size: 14px;
      font-weight: 800;
      border: 1px solid rgba(255, 255, 255, 0.22);
      color: #ffffff;
      background: linear-gradient(135deg, var(--green), var(--green-dark));
      box-shadow: 0 14px 34px rgba(34, 197, 94, 0.25);
      cursor: pointer;
    }

    .button.secondary {
      background: rgba(255, 255, 255, 0.10);
      box-shadow: none;
    }

    .loader {
      width: 42px;
      height: 42px;
      margin: 22px auto 0;
      border-radius: 999px;
      border: 4px solid rgba(255, 255, 255, 0.20);
      border-top-color: rgba(34, 197, 94, 0.95);
      animation: spin 0.85s linear infinite;
    }

    .status {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card" aria-label="SmartGIS Production Gateway">
      <div class="logo">E</div>

      <h1>EcoSmartGIS RTH</h1>

      <p>
        Mengalihkan ke halaman production resmi SmartGIS.
        Halaman production tidak dimuat melalui iframe untuk menjaga pengamanan anti-clickjacking.
      </p>

      <div class="loader" aria-hidden="true"></div>
      <div class="status" id="status">Mohon tunggu, SmartGIS sedang dibuka...</div>

      <div class="actions">
        <a class="button" id="openSmartgis" href="#">Buka SmartGIS</a>
        <a class="button secondary" href="./">Refresh Gateway</a>
      </div>
    </section>
  </main>

  <script>
    const APP_URL = "https://script.google.com/macros/s/AKfycbzDMAArlLEaMOlq-Y6f-pRbX-Qg4aMLikRlaPOa92TtObYqjiWFnHZmQPmEcCQDLq5aoQ/exec";

    const queryString = window.location.search || "";
    const hashString = window.location.hash || "";
    const targetUrl = APP_URL + queryString + hashString;

    const openButton = document.getElementById("openSmartgis");
    const statusText = document.getElementById("status");

    openButton.href = targetUrl;

    function redirectToSmartGIS() {
      statusText.textContent = "Membuka SmartGIS Production...";
      window.location.replace(targetUrl);
    }

    window.setTimeout(redirectToSmartGIS, 1200);
  </script>

  <noscript>
    <meta http-equiv="refresh" content="0;url=https://script.google.com/macros/s/AKfycbzDMAArlLEaMOlq-Y6f-pRbX-Qg4aMLikRlaPOa92TtObYqjiWFnHZmQPmEcCQDLq5aoQ/exec">
  </noscript>
</body>
</html>
